<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel CRUD — Usuários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container my-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2 border-warning border-opacity-25">
            <div class="d-flex align-items-center gap-3">
                <div class="bg-white p-3 rounded-4 shadow-sm text-brand fs-2 d-inline-flex">
                    <i class="bi bi-people-fill"></i>
                </div>
                <div>
                    <h2 class="text-brand m-0 fw-bold">Gerenciamento de Usuários</h2>
                    <small class="text-muted">Painel Administrativo Geral</small>
                </div>
            </div>
            <a href="/test" class="btn btn-outline-brand d-inline-flex align-items-center gap-2">
                <i class="bi bi-arrow-left-short fs-4"></i> Voltar para o Site
            </a>
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                
                <div class="crud-card">
                    <h4 class="text-brand mb-4 d-flex align-items-center gap-2">
                        <i class="bi bi-plus-circle-fill opacity-75"></i> Cadastrar Novo Usuário
                    </h4>
                    <div class="mb-3">
                        <label class="form-label">Nome de Usuário</label>
                        <input type="text" id="c-nome" class="form-control" placeholder="Ex: joao_silva">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail corporativo / pessoal</label>
                        <input type="email" id="c-email" class="form-control" placeholder="Ex: joao@email.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha de Acesso</label>
                        <input type="password" id="c-senha" class="form-control" placeholder="Mínimo 6 caracteres">
                    </div>
                    <button class="btn btn-brand w-100" onclick="createUsuario()">
                        <i class="bi bi-check-lg me-1"></i> Salvar Registro
                    </button>
                </div>

                <div class="crud-card">
                    <h4 class="text-brand mb-4 d-flex align-items-center gap-2">
                        <i class="bi bi-pencil-square opacity-75"></i> Modificar Cadastro Existente
                    </h4>
                    <div class="mb-3">
                        <label class="form-label">ID do Registro</label>
                        <input type="text" id="u-id" class="form-control bg-light text-muted" readonly placeholder="Selecione um usuário na tabela">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nome de Usuário</label>
                        <input type="text" id="u-nome" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail de contato</label>
                        <input type="email" id="u-email" class="form-control">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Nova Senha (Deixe em branco para manter)</label>
                        <input type="password" id="u-senha" class="form-control" placeholder="••••••••">
                    </div>
                    <button class="btn btn-brand w-100" onclick="updateUsuario()">
                        <i class="bi bi-arrow-clockwise me-1"></i> Atualizar Informações
                    </button>
                </div>

            </div>

            <div class="col-lg-7">
                
                <div class="crud-card">
                    <h4 class="text-brand mb-4 d-flex align-items-center gap-2">
                        <i class="bi bi-table opacity-75"></i> Base de Usuários Cadastrados
                    </h4>
                    
                    <div class="table-responsive-wrapper">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th style="width: 70px;">ID</th>
                                        <th>Nome de Usuário</th>
                                        <th>E-mail Corporativo</th>
                                        <th class="text-center" style="width: 120px;">Ações</th>
                                    </tr>
                                </thead>
                                <tbody class="table-group-divider">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="crud-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center gap-2 text-secondary fw-semibold font-monospace small">
                            <i class="bi bi-terminal-fill"></i> Respostas do Servidor
                        </div>
                        <button class="btn btn-link btn-sm text-decoration-none text-muted" onclick="clearLog()">
                            <i class="bi bi-trash3 small"></i> Limpar console
                        </button>
                    </div>
                    <pre id=\"log\" class="terminal-log mb-0">— pronto para monitorar requisições —</pre>
                </div>

            </div>
        </div>
    </div>

    <footer>
        <p class="mb-0">
            © 2026 - Proteja • Respeite • Ame
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="{{ url_for('static', filename='Usuario/script.js') }}"></script>
</body>
</html>
