<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vozes que não podem gritar — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background-color: #fffcc9; font-family: Arial, sans-serif; }
        .login-card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(122, 75, 0, 0.1); padding: 40px; max-width: 420px; width: 100%; }
        .btn-brand { background-color: #7a4b00; color: #fff; border-radius: 30px; font-weight: 600; border: none; padding: 10px; transition: all 0.2s; }
        .btn-brand:hover { background-color: #5c3900; color: #fff; }
        .text-brand { color: #7a4b00; font-weight: bold; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="login-card">
        <h3 class="text-center text-brand mb-4">Acesso ao Sistema</h3>
        
        <div id="alert-erro" class="alert alert-danger d-none" role="alert"></div>

        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label text-secondary small text-uppercase">E-mail</label>
                <input type="email" id="email" class="form-control" required placeholder="seu@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary small text-uppercase">Senha</label>
                <input type="password" id="senha" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-brand w-100 mt-3">Entrar</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='Login/script.js') }}"></script>
</body>
</html>
