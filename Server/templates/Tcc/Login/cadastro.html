<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vozes que não podem gritar — Cadastro</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { 
            background-color: #fffcc9; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        .register-card { 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(122, 75, 0, 0.08); 
            padding: 40px; 
            max-width: 480px; 
            width: 100%; 
            border: 1px solid rgba(122, 75, 0, 0.05);
        }
        .btn-brand { 
            background-color: #7a4b00; 
            color: #fff; 
            border-radius: 30px; 
            font-weight: 600; 
            border: none; 
            padding: 12px; 
            transition: all 0.2s ease-in-out; 
        }
        .btn-brand:hover { 
            background-color: #5c3900; 
            color: #fff; 
            transform: translateY(-1px);
        }
        .text-brand { 
            color: #7a4b00; 
            font-weight: bold; 
        }
        .form-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-control {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #7a4b00;
            box-shadow: 0 0 0 0.25rem rgba(122, 75, 0, 0.15);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100 py-4">

    <div class="register-card my-auto">
        <h3 class="text-center text-brand mb-2">Crie sua Conta</h3>
        <p class="text-muted text-center small mb-4">Junte-se a nós no combate aos maus-tratos de animais</p>
        
        <div id="alert-message" class="alert d-none" role="alert"></div>

        <form id="formCadastro">
            <div class="mb-3">
                <label class="form-label">Nome de Usuário</label>
                <input type="text" id="nome_usuario" class="form-control" required placeholder="ex: JoaoSilva">
            </div>
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" id="email" class="form-control" required placeholder="seu@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control" required placeholder="Mínimo 8 caracteres">
            </div>
            <button type="submit" class="btn btn-brand w-100 mt-3">Registrar-se</button>
        </form>

        <div class="text-center mt-4 border-top pt-3">
            <p class="small text-muted mb-0">Já possui uma conta? <a href="/test/login" class="text-brand text-decoration-none">Entre aqui</a></p>
        </div>
    </div>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertMsg = document.getElementById('alert-message');
            alertMsg.classList.add('d-none');
            alertMsg.classList.remove('alert-danger', 'alert-success');

            const nome_usuario = document.getElementById('nome_usuario').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();

            if (senha.length < 8) {
                alertMsg.textContent = "A senha deve conter no mínimo 8 caracteres.";
                alertMsg.classList.add('alert-danger');
                alertMsg.classList.remove('d-none');
                return;
            }

            try {
                const response = await fetch('/api/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome_usuario, email, senha })
                });

                const dados = await response.json();

                if (response.ok) {
                    alertMsg.textContent = "Cadastro realizado com sucesso! Redirecionando para o login...";
                    alertMsg.classList.add('alert-success');
                    alertMsg.classList.remove('d-none');
                    document.getElementById('formCadastro').reset();
                    setTimeout(() => {
                        window.location.href = '/test/login';
                    }, 2000);
                } else {
                    let msg = dados.error || "Erro ao realizar o cadastro.";
                    if (dados.details) {
                        const errors = Object.values(dados.details).join(' | ');
                        msg += ` (${errors})`;
                    }
                    alertMsg.textContent = msg;
                    alertMsg.classList.add('alert-danger');
                    alertMsg.classList.remove('d-none');
                }
            } catch (error) {
                alertMsg.textContent = "Erro ao conectar com o servidor.";
                alertMsg.classList.add('alert-danger');
                alertMsg.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
