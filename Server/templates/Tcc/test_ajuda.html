<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste CRUD — Ajuda</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: #eee; margin: 0; padding: 1.5rem; }
    h1 { color: #e07b39; }
    a { color: #e07b39; }
    .section { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
    h2 { margin-top: 0; color: #ccc; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 2px; }
    input, textarea { width: 100%; padding: 0.4rem 0.6rem; background: #2a2a2a; border: 1px solid #444; color: #eee; border-radius: 4px; margin-bottom: 0.6rem; }
    textarea { min-height: 80px; resize: vertical; }
    button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-green { background: #28a745; color: #fff; }
    .btn-blue  { background: #007bff; color: #fff; }
    .btn-red   { background: #dc3545; color: #fff; }
    .btn-gray  { background: #555; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #333; vertical-align: top; }
    th { color: #aaa; }
    .corpo-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    pre { background: #0d0d0d; padding: 0.8rem; border-radius: 4px; font-size: 0.78rem; overflow-x: auto; max-height: 200px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <p><a href="/test">← Voltar ao índice</a></p>
  <h1>❓ CRUD — Ajuda</h1>

  <div class="section">
    <h2>➕ Criar Seção de Ajuda (POST)</h2>
    <label>Título *</label>
    <input id="c-titulo" placeholder="ex: Como fazer uma denúncia?">
    <label>Corpo *</label>
    <textarea id="c-corpo" placeholder="Conteúdo / instruções..."></textarea>
    <label>Chave PIX para Doação *</label>
    <input id="c-pix" placeholder="CPF, CNPJ, e-mail, tel ou UUID">
    <button class="btn-green" onclick="createAjuda()">Criar</button>
  </div>

  <div class="section">
    <h2>📋 Listar Ajuda (GET)</h2>
    <button class="btn-blue" onclick="loadAjuda()">Carregar / Atualizar</button>
    <br><br>
    <table id="tbl-ajuda">
      <thead><tr><th>ID</th><th>Título</th><th>Corpo</th><th>PIX</th><th>Ações</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>✏️ Atualizar Ajuda (PUT)</h2>
    <label>ID *</label>
    <input id="u-id" type="number" placeholder="ex: 1">
    <label>Novo Título (opcional)</label>
    <input id="u-titulo" placeholder="Deixe vazio para não alterar">
    <label>Novo Corpo (opcional)</label>
    <textarea id="u-corpo" placeholder="Deixe vazio para não alterar"></textarea>
    <label>Nova Chave PIX (opcional)</label>
    <input id="u-pix" placeholder="Deixe vazio para não alterar">
    <button class="btn-blue" onclick="updateAjuda()">Atualizar</button>
  </div>

  <div class="section">
    <h2>📄 Log de Respostas</h2>
    <button class="btn-gray" onclick="clearLog()">Limpar</button>
    <pre id="log">— aguardando ações —</pre>
  </div>

<script>
  const BASE = '/api/ajuda';

  function log(msg) {
    document.getElementById('log').textContent =
      (typeof msg === 'string' ? msg : JSON.stringify(msg, null, 2));
  }

  async function apiFetch(url, opts = {}) {
    const r = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (r.status === 204) return { success: true, message: 'Deletado (204)' };
    return r.json();
  }

  async function createAjuda() {
    const body = {
      titulo:     document.getElementById('c-titulo').value,
      corpo:      document.getElementById('c-corpo').value,
      pix_doacao: document.getElementById('c-pix').value,
    };
    const res = await apiFetch(BASE, { method: 'POST', body: JSON.stringify(body) });
    log(res);
    if (res.success) loadAjuda();
  }

  async function loadAjuda() {
    const res = await apiFetch(BASE);
    log(res);
    const tbody = document.querySelector('#tbl-ajuda tbody');
    tbody.innerHTML = '';
    (res.data || []).forEach(a => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${a.id}</td>
        <td>${a.titulo}</td>
        <td class="corpo-cell" title="${a.corpo}">${a.corpo}</td>
        <td>${a.pix_doacao}</td>
        <td>
          <button class="btn-blue" onclick="fillUpdate(${a.id},'${esc(a.titulo)}','${esc(a.corpo)}','${esc(a.pix_doacao)}')">✏️</button>
          <button class="btn-red" onclick="deleteAjuda(${a.id})">🗑️</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

  function fillUpdate(id, titulo, corpo, pix) {
    document.getElementById('u-id').value     = id;
    document.getElementById('u-titulo').value = titulo;
    document.getElementById('u-corpo').value  = corpo;
    document.getElementById('u-pix').value    = pix;
  }

  async function updateAjuda() {
    const id = document.getElementById('u-id').value;
    if (!id) { log('Informe o ID'); return; }
    const body = {};
    const t = document.getElementById('u-titulo').value.trim();
    const c = document.getElementById('u-corpo').value.trim();
    const p = document.getElementById('u-pix').value.trim();
    if (t) body.titulo = t;
    if (c) body.corpo  = c;
    if (p) body.pix_doacao = p;
    const res = await apiFetch(`${BASE}/${id}`, { method: 'PUT', body: JSON.stringify(body) });
    log(res);
    if (res.success) loadAjuda();
  }

  async function deleteAjuda(id) {
    if (!confirm(`Deletar ajuda ID ${id}?`)) return;
    const res = await apiFetch(`${BASE}/${id}`, { method: 'DELETE' });
    log(res);
    loadAjuda();
  }

  function clearLog() { document.getElementById('log').textContent = '— aguardando ações —'; }

  loadAjuda();
</script>
</body>
</html>
