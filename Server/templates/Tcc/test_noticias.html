<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste CRUD — Notícias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
      body{
          background-color:#fffcc9;
      }

      .page-title{
          color:#7a4b00;
          font-weight:bold;
      }

      .card{
          border:none;
          border-radius:15px;
          box-shadow:0 4px 12px rgba(0,0,0,.08);
      }

      .card-header{
          background:#7a4b00;
          color:white;
          font-weight:bold;
          border-radius:15px 15px 0 0 !important;
      }

      .btn-primary{
          background:#7a4b00;
          border-color:#7a4b00;
      }

      .btn-primary:hover{
          background:#5d3900;
          border-color:#5d3900;
      }

      .table thead{
          background:#7a4b00;
          color:white;
      }

      .corpo-cell{
          max-width:300px;
          overflow:hidden;
          text-overflow:ellipsis;
          white-space:nowrap;
      }

      #log{
          min-height:200px;
      }
  </style>
</head>
<body>

<div class="container py-4">

    <a href="/test" class="btn btn-outline-secondary mb-3">
        ← Voltar
    </a>

    <h1 class="page-title mb-4">
        📰 CRUD — Notícias
    </h1>

    <!-- CRIAR -->
    <div class="card mb-4">
        <div class="card-header">
            ➕ Criar Notícia
        </div>

        <div class="card-body">

            <div class="mb-3">
                <label class="form-label">Título</label>
                <input id="c-titulo" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Corpo</label>
                <textarea id="c-corpo" class="form-control"></textarea>
            </div>

            <button class="btn btn-success" onclick="createNoticia()">
                Criar
            </button>

        </div>
    </div>

    <!-- LISTAR -->
    <div class="card mb-4">

        <div class="card-header">
            📋 Listar Notícias
        </div>

        <div class="card-body">

            <button class="btn btn-primary mb-3" onclick="loadNoticias()">
                Atualizar
            </button>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Corpo</th>
                            <th>Data/Hora</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody></tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- ATUALIZAR -->
    <div class="card mb-4">

        <div class="card-header">
            ✏️ Atualizar Notícia
        </div>

        <div class="card-body">

            <div class="mb-3">
                <label class="form-label">ID</label>
                <input id="u-id" type="number" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Novo Título</label>
                <input id="u-titulo" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Novo Corpo</label>
                <textarea id="u-corpo" class="form-control"></textarea>
            </div>

            <button class="btn btn-primary" onclick="updateNoticia()">
                Atualizar
            </button>

        </div>

    </div>

    <!-- LOG -->
    <div class="card">

        <div class="card-header">
            📄 Log de Respostas
        </div>

        <div class="card-body">

            <button class="btn btn-secondary mb-3" onclick="clearLog()">
                Limpar
            </button>

            <pre id="log" class="bg-light p-3 rounded">
— aguardando ações —
            </pre>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>  
</body>
<script>
  const BASE = '/api/noticias';

  function log(msg) {
    document.getElementById('log').textContent =
      (typeof msg === 'string' ? msg : JSON.stringify(msg, null, 2));
  }

  async function apiFetch(url, opts = {}) {
    const r = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (r.status === 204) return { success: true, message: 'Deletado (204)' };
    return r.json();
  }

  async function createNoticia() {
    const body = {
      titulo: document.getElementById('c-titulo').value,
      corpo:  document.getElementById('c-corpo').value,
    };
    const res = await apiFetch(BASE, { method: 'POST', body: JSON.stringify(body) });
    log(res);
    if (res.success) loadNoticias();
  }

  async function loadNoticias() {
    const res = await apiFetch(BASE);
    log(res);
    const tbody = document.querySelector('#tbl-noticias tbody');
    tbody.innerHTML = '';
    (res.data || []).forEach(n => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${n.id}</td>
        <td>${n.titulo}</td>
        <td class="corpo-cell" title="${n.corpo}">${n.corpo}</td>
        <td>${n.data_hora || ''}</td>
        <td>
          <button class="btn-blue" onclick="fillUpdate(${n.id},'${escJs(n.titulo)}','${escJs(n.corpo)}')">✏️</button>
          <button class="btn-red" onclick="deleteNoticia(${n.id})">🗑️</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function escJs(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

  function fillUpdate(id, titulo, corpo) {
    document.getElementById('u-id').value = id;
    document.getElementById('u-titulo').value = titulo;
    document.getElementById('u-corpo').value = corpo;
  }

  async function updateNoticia() {
    const id = document.getElementById('u-id').value;
    if (!id) { log('Informe o ID'); return; }
    const body = {};
    const t = document.getElementById('u-titulo').value.trim();
    const c = document.getElementById('u-corpo').value.trim();
    if (t) body.titulo = t;
    if (c) body.corpo  = c;
    const res = await apiFetch(`${BASE}/${id}`, { method: 'PUT', body: JSON.stringify(body) });
    log(res);
    if (res.success) loadNoticias();
  }

  async function deleteNoticia(id) {
    if (!confirm(`Deletar notícia ID ${id}?`)) return;
    const res = await apiFetch(`${BASE}/${id}`, { method: 'DELETE' });
    log(res);
    loadNoticias();
  }

  function clearLog() { document.getElementById('log').textContent = '— aguardando ações —'; }

  loadNoticias();
</script>
</html>
