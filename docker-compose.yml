services:
  # Backend da aplicação (Flask)
  server:
    build: ./Server
    container_name: flask_server
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=19032007
      - DATABASE_NAME=MausTratosDB
      - MEMCACHED_HOST=memcached
      - MEMCACHED_PORT=11211
    depends_on:
      - mariadb
      - memcached
    networks:
      - app-network

  # Banco de dados de cache
  memcached:
    image: memcached:alpine
    container_name: cache_memcached
    ports:
      - "11211:11211"
    networks:
      - app-network

  # Banco de dados relacional
  mariadb:
    image: mariadb:latest
    container_name: db_mariadb
    environment:
      - MARIADB_ROOT_PASSWORD=19032007
      - MARIADB_DATABASE=MausTratosDB
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql:z
      # Linha adicionada para carregar o SQL automaticamente:
      - ./Server/Databases/MariaDB_MauTratos.sql:/docker-entrypoint-initdb.d/MariaDB_MauTratos.sql:z
    networks:
      - app-network

volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge